<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BCIT MedLab Wordle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="toast">Not in word list</div>

    <header>
        <h1>BCIT MedLab Wordle</h1>
        <div id="day-display">Day <span id="day-number">1</span></div>
    </header>

    <div id="game-container">
        </div>

    <div id="keyboard">
        <div class="kb-row">
            <div class="key" data-key="Q" onclick="handleKey('Q')">Q</div>
            <div class="key" data-key="W" onclick="handleKey('W')">W</div>
            <div class="key" data-key="E" onclick="handleKey('E')">E</div>
            <div class="key" data-key="R" onclick="handleKey('R')">R</div>
            <div class="key" data-key="T" onclick="handleKey('T')">T</div>
            <div class="key" data-key="Y" onclick="handleKey('Y')">Y</div>
            <div class="key" data-key="U" onclick="handleKey('U')">U</div>
            <div class="key" data-key="I" onclick="handleKey('I')">I</div>
            <div class="key" data-key="O" onclick="handleKey('O')">O</div>
            <div class="key" data-key="P" onclick="handleKey('P')">P</div>
        </div>
        <div class="kb-row">
            <div class="key" data-key="A" onclick="handleKey('A')">A</div>
            <div class="key" data-key="S" onclick="handleKey('S')">S</div>
            <div class="key" data-key="D" onclick="handleKey('D')">D</div>
            <div class="key" data-key="F" onclick="handleKey('F')">F</div>
            <div class="key" data-key="G" onclick="handleKey('G')">G</div>
            <div class="key" data-key="H" onclick="handleKey('H')">H</div>
            <div class="key" data-key="J" onclick="handleKey('J')">J</div>
            <div class="key" data-key="K" onclick="handleKey('K')">K</div>
            <div class="key" data-key="L" onclick="handleKey('L')">L</div>
        </div>
        <div class="kb-row">
            <div class="key large" data-key="ENTER" onclick="handleKey('ENTER')">ENTER</div>
            <div class="key" data-key="Z" onclick="handleKey('Z')">Z</div>
            <div class="key" data-key="X" onclick="handleKey('X')">X</div>
            <div class="key" data-key="C" onclick="handleKey('C')">C</div>
            <div class="key" data-key="V" onclick="handleKey('V')">V</div>
            <div class="key" data-key="B" onclick="handleKey('B')">B</div>
            <div class="key" data-key="N" onclick="handleKey('N')">N</div>
            <div class="key" data-key="M" onclick="handleKey('M')">M</div>
            <div class="key large" data-key="BACKSPACE" onclick="handleKey('BACKSPACE')">⌫</div>
        </div>
    </div>

    <div id="modal">
        <h2 id="modal-title"></h2>
        <p id="modal-msg"></p>
        <button onclick="share()">SHARE RESULTS 📋</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
