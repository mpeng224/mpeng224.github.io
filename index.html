<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>5-Day Wordle Challenge</title>
    <style>
        :root {
            --green: #6aaa64; --yellow: #c9b458; --gray: #3a3a3c;
            --black: #121213; --border: #3a3a3c; --white: #ffffff;
            --tile-size: min(65px, 13vw);
        }
        
        * { box-sizing: border-box; touch-action: manipulation; }

        body {
            background-color: var(--black); color: var(--white);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex; flex-direction: column; 
            height: 100vh; height: -webkit-fill-available;
            margin: 0; overflow: hidden;
        }

        header { border-bottom: 1px solid var(--border); height: 50px; display: flex; align-items: center; justify-content: center; }
        header h1 { font-size: 1.2rem; margin: 0; text-transform: uppercase; letter-spacing: 1px; }

        #game-container { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 5px; }
        .row { display: flex; gap: 5px; }

        /* Shake animation for invalid words */
        .shake { animation: shake 0.5s; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }

        .tile {
            width: var(--tile-size); height: var(--tile-size); 
            border: 2px solid var(--border);
            display: flex; justify-content: center; align-items: center;
            font-size: 1.8rem; font-weight: bold; text-transform: uppercase;
        }

        .tile[data-state="correct"] { background-color: var(--green); border-color: var(--green); }
        .tile[data-state="present"] { background-color: var(--yellow); border-color: var(--yellow); }
        .tile[data-state="absent"] { background-color: var(--gray); border-color: var(--gray); }
        
        #keyboard { padding: 10px 5px calc(10px + env(safe-area-inset-bottom)); width: 100%; max-width: 500px; margin: 0 auto; }
        .kb-row { display: flex; justify-content: center; gap: 4px; margin-bottom: 8px; }
        .key {
            background-color: #818384; border-radius: 4px; height: 58px;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; font-weight: bold; flex: 1; font-size: 0.9rem;
        }
        .key.large { flex: 1.5; font-size: 0.7rem; }

        /* Notification Toast */
        #toast {
            position: fixed; top: 15%; left: 50%; transform: translateX(-50%);
            background: white; color: black; padding: 10px 20px; border-radius: 5px;
            font-weight: bold; display: none; z-index: 1000;
        }

        #modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #1a1a1b; padding: 25px; border-radius: 12px; border: 1px solid var(--border);
            text-align: center; display: none; z-index: 100; width: 85%; max-width: 320px;
        }
        #modal button { background: var(--green); color: white; border: none; padding: 12px 24px; font-weight: bold; border-radius: 4px; width: 100%; margin-top: 20px; }
    </style>
</head>
<body>

<div id="toast">Not in word list</div>
<header><h1>Day <span id="day-number">1</span> Challenge</h1></header>
<div id="game-container"></div>

<div id="keyboard">
    <div class="kb-row">
        <div class="key" onclick="handleKey('Q')">Q</div><div class="key" onclick="handleKey('W')">W</div><div class="key" onclick="handleKey('E')">E</div><div class="key" onclick="handleKey('R')">R</div><div class="key" onclick="handleKey('T')">T</div><div class="key" onclick="handleKey('Y')">Y</div><div class="key" onclick="handleKey('U')">U</div><div class="key" onclick="handleKey('I')">I</div><div class="key" onclick="handleKey('O')">O</div><div class="key" onclick="handleKey('P')">P</div>
    </div>
    <div class="kb-row">
        <div class="key" onclick="handleKey('A')">A</div><div class="key" onclick="handleKey('S')">S</div><div class="key" onclick="handleKey('D')">D</div><div class="key" onclick="handleKey('F')">F</div><div class="key" onclick="handleKey('G')">G</div><div class="key" onclick="handleKey('H')">H</div><div class="key" onclick="handleKey('J')">J</div><div class="key" onclick="handleKey('K')">K</div><div class="key" onclick="handleKey('L')">L</div>
    </div>
    <div class="kb-row">
        <div class="key large" onclick="handleKey('ENTER')">ENTER</div>
        <div class="key" onclick="handleKey('Z')">Z</div><div class="key" onclick="handleKey('X')">X</div><div class="key" onclick="handleKey('C')">C</div><div class="key" onclick="handleKey('V')">V</div><div class="key" onclick="handleKey('B')">B</div><div class="key" onclick="handleKey('N')">N</div><div class="key" onclick="handleKey('M')">M</div>
        <div class="key large" onclick="handleKey('BACKSPACE')">⌫</div>
    </div>
</div>

<div id="modal">
    <h2 id="modal-title"></h2>
    <p id="modal-msg"></p>
    <button onclick="share()">SHARE RESULTS 📋</button>
</div>

<script>
    const CHALLENGE_WORDS = ["COCCI", "BLAST", "SERUM", "STAIN", "CROSS"];
    const START_DATE = new Date("2026-03-24"); 
    
    let validWords = new Set();
    const dayIndex = Math.floor((new Date() - START_DATE) / (1000 * 60 * 60 * 24));
    const targetWord = (dayIndex >= 0 && dayIndex < 5) ? CHALLENGE_WORDS[dayIndex].toUpperCase() : "DONE";
    
    let currentGuess = "";
    let guesses = [];
    let gameOver = false;

    // Load dictionary from a public URL
    async function loadDictionary() {
        try {
            const resp = await fetch('https://raw.githubusercontent.com/charlesreid1/five-letter-words/master/sgb-words.txt');
            const text = await resp.text();
            validWords = new Set(text.toUpperCase().split('\n').map(w => w.trim()));
            // Also ensure your specific challenge words are in the valid list
            CHALLENGE_WORDS.forEach(w => validWords.add(w.toUpperCase()));
        } catch (e) {
            console.error("Dictionary failed to load", e);
        }
    }

    function initBoard() {
        document.getElementById('day-number').innerText = dayIndex + 1;
        const container = document.getElementById('game-container');
        if (targetWord === "DONE") {
            container.innerHTML = "<h2>Challenge Complete!</h2>";
            return;
        }
        for (let i = 0; i < 6; i++) {
            const row = document.createElement('div');
            row.className = 'row';
            row.id = `row-${i}`;
            for (let j = 0; j < 5; j++) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.id = `tile-${i}-${j}`;
                row.appendChild(tile);
            }
            container.appendChild(row);
        }
        const storageKey = `wordle_day_${dayIndex}`;
        const saved = JSON.parse(localStorage.getItem(storageKey));
        if (saved) { 
            guesses = saved.guesses; 
            gameOver = saved.gameOver;
            guesses.forEach((g, i) => revealWord(g, i));
            if (gameOver) setTimeout(showModal, 500);
        }
    }

    function handleKey(key) {
        if (gameOver || targetWord === "DONE") return;
        if (key === "ENTER") {
            if (currentGuess.length === 5) submitGuess();
        } else if (key === "BACKSPACE" || key === "⌫") {
            currentGuess = currentGuess.slice(0, -1);
        } else if (currentGuess.length < 5 && /^[A-Z]$/.test(key)) {
            currentGuess += key;
        }
        updateBoard();
    }

    function updateBoard() {
        const rowIdx = guesses.length;
        if (rowIdx > 5) return;
        for (let j = 0; j < 5; j++) {
            const tile = document.getElementById(`tile-${rowIdx}-${j}`);
            tile.innerText = currentGuess[j] || "";
            tile.style.borderColor = currentGuess[j] ? "#565758" : "";
        }
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 2000);
        
        const currentRow = document.getElementById(`row-${guesses.length}`);
        currentRow.classList.add('shake');
        setTimeout(() => currentRow.classList.remove('shake'), 500);
    }

    function submitGuess() {
        if (!validWords.has(currentGuess)) {
            showToast("Not in word list");
            return;
        }

        guesses.push(currentGuess);
        revealWord(currentGuess, guesses.length - 1);
        
        if (currentGuess === targetWord || guesses.length === 6) {
            gameOver = true;
            setTimeout(showModal, 1000);
        }
        
        localStorage.setItem(`wordle_day_${dayIndex}`, JSON.stringify({guesses, gameOver}));
        currentGuess = "";
    }

    function revealWord(guess, rowIdx) {
        const rowTiles = Array.from({length: 5}, (_, j) => document.getElementById(`tile-${rowIdx}-${j}`));
        const targetArr = targetWord.split('');
        
        guess.split('').forEach((letter, i) => {
            if (letter === targetWord[i]) {
                rowTiles[i].setAttribute('data-state', 'correct');
                targetArr[i] = null;
            }
        });

        guess.split('').forEach((letter, i) => {
            if (rowTiles[i].getAttribute('data-state')) return;
            const idx = targetArr.indexOf(letter);
            if (idx !== -1) {
                rowTiles[i].setAttribute('data-state', 'present');
                targetArr[idx] = null;
            } else {
                rowTiles[i].setAttribute('data-state', 'absent');
            }
        });
    }

    function showModal() {
        const win = guesses[guesses.length - 1] === targetWord;
        document.getElementById('modal-title').innerText = win ? "Genius!" : "Next time!";
        document.getElementById('modal-msg').innerText = win ? `Solved in ${guesses.length}/6` : `Word: ${targetWord}`;
        document.getElementById('modal').style.display = 'block';
    }

    async function share() {
        let grid = `Challenge Day ${dayIndex + 1} (${guesses.length}/6)\n`;
        guesses.forEach(g => {
            let rowStates = new Array(5).fill('⬛');
            let tempTarget = targetWord.split('');
            g.split('').forEach((l, i) => { if (l === targetWord[i]) { rowStates[i] = '🟩'; tempTarget[i] = null; } });
            g.split('').forEach((l, i) => {
                if (rowStates[i] !== '🟩') {
                    let idx = tempTarget.indexOf(l);
                    if (idx !== -1) { rowStates[i] = '🟨'; tempTarget[idx] = null; }
                }
            });
            grid += rowStates.join('') + "\n";
        });
        if (navigator.share) await navigator.share({ text: grid });
        else { navigator.clipboard.writeText(grid); alert("Copied!"); }
    }

    window.addEventListener('keydown', (e) => handleKey(e.key.toUpperCase()));
    loadDictionary().then(initBoard);
</script>
</body>
</html>
